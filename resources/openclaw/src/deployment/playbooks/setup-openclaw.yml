---
- name: Setup OpenClaw
  hosts: all
  become: true
  become_method: ansible.builtin.sudo
  become_user: root
  gather_facts: true
  connection: ssh
  remote_user: root

  tasks:
    - name: Disable password SSH access
      lineinfile:
        dest: /etc/ssh/sshd_config
        regexp: "PasswordAuthentication .*"
        line: "PasswordAuthentication no"
        state: present

    - name: Upgrade and update apt
      apt:
        update_cache: true
        upgrade: full

    - name: Install dependencies
      apt:
        name:
          - nano
          - ca-certificates
          - curl
          - git
          - build-essential
          - cmake
          - procps
          - file
          - libsdl2-dev
          - libsdl2-mixer-dev
          - libsdl2-image-dev
          - libsdl2-ttf-dev
          - zlib1g-dev
          - python3-minimal
          - unzip
          - jq
          - yq
          - sudo
        state: present

    - name: Create linuxbrew directory
      file:
        path: /home/linuxbrew/.linuxbrew
        state: directory
        owner: openclaw
        group: openclaw
        mode: "0755"

    - name: Install Homebrew as openclaw user
      shell: /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
      environment:
        NONINTERACTIVE: "1"
      args:
        creates: /home/linuxbrew/.linuxbrew/bin/brew
      become: true
      become_user: openclaw

    - name: Install OpenClaw
      shell: curl -fsSL https://raw.githubusercontent.com/openclaw/openclaw-ansible/main/install.sh | bash
    
    # Manual steps on box: https://github.com/openclaw/openclaw-ansible?tab=readme-ov-file#post-install