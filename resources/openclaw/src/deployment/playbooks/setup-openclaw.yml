---
- name: Setup OpenClaw
  hosts: all
  become: true
  become_method: ansible.builtin.sudo
  become_user: root
  gather_facts: true
  connection: ssh
  remote_user: root

  tasks:
    - name: Disable password SSH access
      lineinfile:
        dest: /etc/ssh/sshd_config
        regexp: "PasswordAuthentication .*"
        line: "PasswordAuthentication no"
        state: present

    - name: Upgrade and update apt
      apt:
        update_cache: true
        upgrade: full

    - name: Install dependencies
      apt:
        name:
          - ca-certificates
          - curl
          - git
          - build-essential
          - cmake
          - libsdl2-dev
          - libsdl2-mixer-dev
          - libsdl2-image-dev
          - libsdl2-ttf-dev
          - zlib1g-dev
          - python3-minimal
          - unzip
          - jq
          - yq
        state: present

    - name: Install dependencies
      apt:
        name:
          - ca-certificates
          - curl
        state: present

    - name: Install OpenClaw
      shell: curl -fsSL https://openclaw.ai/install.sh | bash -s -- --no-onboard
      args:
        creates: /usr/local/bin/openclaw