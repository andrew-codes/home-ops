---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: playnite-web
  namespace: default
spec:
  template:
    spec:
      containers:
        - name: playnite-web
          image: ghcr.io/andrew-codes/playnite-web-app:dev
          env:
            - name: HOST
              value: staging-games.smith-simms.family
            - name: COVER_ART_PATH
              value: /app/game-assets/cover-art
          volumeMounts:
          - name: game-assets
            mountPath: /app/game-assets/cover-art
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: playnite-web-sync-library-processor
  namespace: default
spec:
  template:
    spec:
      containers:
        - name: sync-library-processor
          image: ghcr.io/andrew-codes/sync-library-processor:dev
