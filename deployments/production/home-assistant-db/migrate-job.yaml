---
# One-off migration job: copy SQLite recorder DB into Postgres.
# Run AFTER Postgres is ready but BEFORE starting HA against Postgres.
# Scale HA to 0 first: kubectl scale deploy/home-assistant --replicas=0
# Apply:  kubectl apply -f migrate-job.yaml
# Watch:  kubectl logs -f job/ha-sqlite-to-postgres
# Clean up after success: kubectl delete job ha-sqlite-to-postgres
apiVersion: batch/v1
kind: Job
metadata:
  name: ha-sqlite-to-postgres
  namespace: default
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      nodeSelector:
        kubernetes.io/hostname: k8s-main
      volumes:
        - name: ha-config
          persistentVolumeClaim:
            claimName: home-assistant-config
            readOnly: true
      containers:
        - name: pgloader
          image: dimitri/pgloader:latest
          command:
            - sh
            - -c
            - |
              cat > /tmp/migrate.load <<EOF
              LOAD DATABASE
                FROM sqlite:///config/home-assistant_v2.db
                INTO postgresql://${PGUSER}:${PGPASSWORD}@home-assistant-postgres:5432/homeassistant
              WITH include drop, create tables, create indexes, reset sequences;
              EOF
              pgloader /tmp/migrate.load
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: home-assistant-postgres
                  key: password
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: home-assistant-postgres
                  key: username
          volumeMounts:
            - name: ha-config
              mountPath: /config
              readOnly: true
